---
deployment:
  tasks:
    - /bin/mkdir -p /home/vdranjxy/public_html
    - /bin/mkdir -p /home/vdranjxy/comrades-master
    
    # 1. Sync Frontend to public_html
    - /usr/bin/rsync -avz --delete frontend/dist/ /home/vdranjxy/public_html/
    - /bin/cp .htaccess /home/vdranjxy/public_html/.htaccess
    
    # 2. Sync Backend to comrades-master (the runtime root)
    # We copy the CONTENTS of the backend folder into comrades-master
    - /usr/bin/rsync -avz --exclude 'node_modules' --exclude 'uploads' --exclude 'error.log' backend/ /home/vdranjxy/comrades-master/
    
    # 3. Touch restart file for Phusion Passenger
    - /bin/mkdir -p /home/vdranjxy/comrades-master/tmp
    - /bin/touch /home/vdranjxy/comrades-master/tmp/restart.txt
