---
deployment:
  tasks:
    - /bin/mkdir -p /home/vdranjxy/public_html
    - /bin/mkdir -p /home/vdranjxy/comrades-master
    # Sync frontend: rsync is faster and cleaner than cp
    - /usr/bin/rsync -avz --delete frontend/dist/ /home/vdranjxy/public_html/
    # Sync backend: Exclude node_modules and uploads to prevent hanging
    - /usr/bin/rsync -avz --exclude 'node_modules' --exclude 'uploads' backend/ /home/vdranjxy/comrades-master/
    - /bin/mkdir -p /home/vdranjxy/comrades-master/tmp
    - /bin/touch /home/vdranjxy/comrades-master/tmp/restart.txt
